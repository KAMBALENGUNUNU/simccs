# ==========================================
# PRODUCTION CONFIGURATION
# ==========================================

# Hibernate must NOT alter schema in production. We use Flyway for that.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway Database Migrations
spring.flyway.enabled=true
# Baseline on migrate allows Flyway to work with the existing database schema
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# CORS Configuration for production (can be overridden by environment variable PROD_CORS_URL)
app.cors.allowed-origins=${PROD_CORS_URL:*}

# Actuator Health Checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
